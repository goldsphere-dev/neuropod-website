# NeuroPod Waitlist — Cloudflare Worker
#
# Setup steps:
#   1. Run `wrangler d1 create myneuropod-waitlist` to create the D1 database.
#      Paste the returned database_id into the [[d1_databases]] block below.
#   2. Run `wrangler d1 execute myneuropod-waitlist --file=./schema.sql --remote`
#      to apply the schema to the remote database.
#   3. Run `wrangler deploy` from inside the worker/ folder to deploy the Worker.
#   4. In Cloudflare Dashboard → Workers & Pages → myneuropod-waitlist →
#      Settings → Triggers → Routes → add route: www.myneuropod.com/subscribe*
#      (This lets the Worker handle POST /subscribe while Pages serves everything else.)

name = "myneuropod-waitlist"
main = "src/index.ts"
compatibility_date = "2025-01-01"

[[routes]]
pattern = "www.myneuropod.com/subscribe*"
zone_name = "myneuropod.com"

[[d1_databases]]
binding = "WAITLIST_DB"
database_name = "myneuropod-waitlist"
database_id = "PASTE_DATABASE_ID_AFTER_CREATION"

[vars]
ALLOWED_ORIGIN = "https://www.myneuropod.com"
SENDGRID_LIST_ID = "758ce5b6-5a9a-4df5-a3c5-374ca8e765bf"
SENDGRID_FROM_EMAIL = "waitlist@myneuropod.com"
SENDGRID_FROM_NAME = "NeuroPod"

# SENDGRID_API_KEY is stored as a secret — never in this file
# Run: wrangler secret put SENDGRID_API_KEY
